name: pinky_shop
description: Pinky Shop - A Flutter e-commerce app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^7.2.0
  firebase_performance: ^0.11.3
  firebase_storage: ^13.3.0

  # State Management
  provider: ^6.1.2

  # Connectivity
  connectivity_plus: ^7.1.1

  # Environment and secure storage
  flutter_dotenv: ^6.0.0
  flutter_secure_storage: ^10.0.0
  bcrypt: ^1.1.3

  # HTTP Client
  http: ^1.1.0
  dio: ^5.3.0
  sentry_flutter: ^8.3.0

  # UI & Fonts
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^8.0.2
  flutter_spinkit: ^5.2.0
  smooth_page_indicator: ^2.0.1
  image_picker: ^1.0.4
  file_picker: ^8.1.7
  
  # Animations
  get: ^4.6.0
  
  # Bottom Navigation
  bottom_navy_bar: ^6.0.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
